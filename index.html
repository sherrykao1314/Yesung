  <script>
    // ⚠️⚠️⚠️ 請貼上你剛剛產生「最新版」的 Google API 網址 ⚠️⚠️⚠️
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzFgYBlnqAprAlxhQD4XT6ld0GGMHFOxsMLXEmoa1l_Kf38kcOg45hxReg9FueAVQD9/exec"; 
    
    const STORAGE_KEY = 'yesung_github_pc_list';
    let myCollection = [];
    let itemDictionary = {}; 
    
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) myCollection = JSON.parse(saved);
    } catch(e) {}

    function updateCounter() {
      let albumCount = 0;
      let cardCount = 0;
      myCollection.forEach(id => {
        if (itemDictionary[id] === '專輯') albumCount++;
        else if (itemDictionary[id]) cardCount++;
      });
      document.getElementById('statCounter').innerText = `${albumCount} 張專輯 / ${cardCount} 張小卡`;
    }

    let allData = { korea: {}, japan: {} };
    let currentCountry = 'korea';

    // 💡 讀取資料並自動套用「設定」分頁的背景
    fetch(GAS_API_URL)
      .then(response => response.json())
      .then(result => {
        if(result.bgUrl) document.getElementById('bgLayer').style.backgroundImage = `url('${result.bgUrl}')`;
        if(result.iconUrl) {
          document.getElementById('dynamic-icon').href = result.iconUrl;
          document.getElementById('dynamic-favicon').href = result.iconUrl;
        }
        processData(result.cards);
      })
      .catch(error => {
        document.getElementById('displayArea').innerHTML = '<div class="empty-msg">讀取資料失敗，請確認 API 網址是否正確並重新整理。</div>';
        console.error("Fetch Error:", error);
      });

    function processData(cards) {
      allData = { korea: {}, japan: {} };
      cards.forEach(card => {
        const [id, name, imgUrl, countryRaw, release, albumHeader, type] = card;
        if (!id || !countryRaw || !release) return;
        const itemId = id.toString();
        itemDictionary[itemId] = type;
        const country = countryRaw.toString().toLowerCase();
        if (!allData[country][release]) allData[country][release] = {};
        const header = albumHeader || "其他";
        if (!allData[country][release][header]) allData[country][release][header] = { albums: [], photocards: [], specialCards: [] };
        const item = { id: itemId, name, imgUrl, type };
        if (type === '專輯') allData[country][release][header].albums.push(item);
        else if (type === '特典卡') allData[country][release][header].specialCards.push(item);
        else allData[country][release][header].photocards.push(item);
      });
      switchCountry('korea');
      updateCounter(); 
    }

    function switchCountry(country, event) {
      currentCountry = country;
      if(event) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
      }
      const subNav = document.getElementById('subNav');
      subNav.innerHTML = '';
      const releases = Object.keys(allData[country]);
      if (releases.length === 0) {
        document.getElementById('displayArea').innerHTML = '<div class="empty-msg">此分類尚無資料</div>';
        return;
      }
      releases.forEach((rel, idx) => {
        const btn = document.createElement('button');
        btn.className = `sub-btn ${idx === 0 ? 'active' : ''}`;
        btn.innerText = rel;
        btn.onclick = (e) => switchRelease(rel, e);
        subNav.appendChild(btn);
      });
      switchRelease(releases[0]);
    }

    function switchRelease(release, event) {
      if(event) {
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
      }
      const area = document.getElementById('displayArea');
      area.innerHTML = ''; 
      const releaseData = allData[currentCountry][release];
      Object.keys(releaseData).forEach(header => {
        const headerDiv = document.createElement('div');
        headerDiv.className = 'album-header';
        headerDiv.innerText = header;
        area.appendChild(headerDiv);
        const data = releaseData[header];
        if (data.albums.length > 0) {
          area.insertAdjacentHTML('beforeend', `<div class="section-title">💿 專輯版本</div>`);
          const g = document.createElement('div'); g.className = 'grid';
          data.albums.forEach(item => g.appendChild(createCard(item)));
          area.appendChild(g);
        }
        if (data.photocards.length > 0) {
          area.insertAdjacentHTML('beforeend', `<div class="section-title">🃏 專輯小卡</div>`);
          const g = document.createElement('div'); g.className = 'grid';
          data.photocards.forEach(item => g.appendChild(createCard(item)));
          area.appendChild(g);
        }
        if (data.specialCards && data.specialCards.length > 0) {
          area.insertAdjacentHTML('beforeend', `<div class="section-title">🎁 特典小卡</div>`);
          const g = document.createElement('div'); g.className = 'grid';
          data.specialCards.forEach(item => g.appendChild(createCard(item)));
          area.appendChild(g);
        }
      });
    }

    function createCard(item) {
      const isOwned = myCollection.includes(item.id);
      const div = document.createElement('div');
      const isAlbum = item.type === '專輯';
      div.className = `card ${isOwned ? 'owned' : ''} ${isAlbum ? 'album-type' : ''}`;
      
      let htmlContent = `<div class="img-wrapper"><img src="${item.imgUrl}" onerror="this.src='https://via.placeholder.com/150x210?text=Error'" loading="lazy"></div>`;
      const hasName = item.name && item.name.toString().trim() !== "";
      if (hasName) htmlContent += `<div class="card-name">${item.name}</div>`;
      
      div.innerHTML = htmlContent;
      div.addEventListener('click', function() {
        const itemId = item.id;
        div.classList.toggle('owned');
        if (myCollection.includes(itemId)) {
          myCollection = myCollection.filter(i => i !== itemId);
        } else {
          myCollection.push(itemId);
        }
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(myCollection)); } catch(e) {}
        updateCounter(); 
      });
      return div;
    }

    function exportData() {
      if(myCollection.length === 0) { alert("你目前還沒有收藏任何小卡喔！"); return; }
      const code = btoa(JSON.stringify(myCollection));
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(code).then(() => {
          alert("✅ 備份代碼已成功複製！\n請將它貼到 LINE 或備忘錄中保存。");
        }).catch(err => { prompt("請手動複製這段備份代碼：", code); });
      } else {
        prompt("請手動複製這段備份代碼：", code);
      }
    }

    function importData() {
      const code = prompt("請貼上你的備份代碼：");
      if (code) {
        try {
          const parsed = JSON.parse(atob(code));
          if(Array.isArray(parsed)) {
            myCollection = parsed;
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(myCollection)); } catch(e) {}
            alert("✅ 進度復原成功！");
            location.reload();
          } else { alert("❌ 代碼格式錯誤，請檢查是否有少複製字元。"); }
        } catch(e) { alert("❌ 代碼無效，請確認這是一段正確的備份碼。"); }
      }
    }
  </script>
